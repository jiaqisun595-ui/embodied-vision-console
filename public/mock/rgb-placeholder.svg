<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0E1A"/>
      <stop offset="100%" stop-color="#10192b"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00E5FF" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#grid)"/>
  <g fill="none" stroke="#00E5FF" stroke-opacity="0.5">
    <rect x="40" y="40" width="1200" height="640" stroke-width="2" stroke-dasharray="8 8"/>
    <line x1="40" y1="360" x2="1240" y2="360" stroke-width="1"/>
    <line x1="640" y1="40" x2="640" y2="680" stroke-width="1"/>
    <circle cx="640" cy="360" r="90" stroke-width="1.5"/>
    <circle cx="640" cy="360" r="140" stroke-width="0.8" stroke-opacity="0.25"/>
  </g>
  <g font-family="JetBrains Mono, monospace" fill="#00E5FF">
    <text x="60" y="90" font-size="22" font-weight="700" letter-spacing="4">RGB · FPV</text>
    <text x="60" y="120" font-size="14" fill-opacity="0.6">SIGNAL: WAITING FOR STREAM</text>
    <text x="60" y="660" font-size="12" fill-opacity="0.5">PLACEHOLDER / NO FEED</text>
    <text x="1220" y="660" font-size="12" fill-opacity="0.5" text-anchor="end">1280 × 720</text>
  </g>
</svg>
