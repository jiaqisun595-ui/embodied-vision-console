<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06091a"/>
      <stop offset="100%" stop-color="#0A0E1A"/>
    </linearGradient>
  </defs>
  <rect width="640" height="480" fill="url(#bg)"/>
  <!-- Perspective floor grid -->
  <g stroke="#00E5FF" stroke-opacity="0.35" fill="none" stroke-width="1">
    <line x1="0" y1="320" x2="640" y2="320"/>
    <line x1="-200" y1="480" x2="320" y2="320"/>
    <line x1="-40" y1="480"  x2="320" y2="320"/>
    <line x1="120" y1="480"  x2="320" y2="320"/>
    <line x1="320" y1="480"  x2="320" y2="320"/>
    <line x1="520" y1="480"  x2="320" y2="320"/>
    <line x1="680" y1="480"  x2="320" y2="320"/>
    <line x1="840" y1="480"  x2="320" y2="320"/>
    <line x1="0" y1="360" x2="640" y2="360" stroke-opacity="0.25"/>
    <line x1="0" y1="400" x2="640" y2="400" stroke-opacity="0.18"/>
    <line x1="0" y1="450" x2="640" y2="450" stroke-opacity="0.12"/>
  </g>
  <!-- Point cloud dots -->
  <g fill="#00E5FF">
    <circle cx="220" cy="260" r="2" fill-opacity="0.8"/>
    <circle cx="260" cy="250" r="2" fill-opacity="0.7"/>
    <circle cx="300" cy="240" r="2" fill-opacity="0.9"/>
    <circle cx="350" cy="245" r="2" fill-opacity="0.7"/>
    <circle cx="400" cy="255" r="2" fill-opacity="0.6"/>
    <circle cx="440" cy="265" r="2" fill-opacity="0.8"/>
    <circle cx="200" cy="280" r="1.5" fill-opacity="0.5"/>
    <circle cx="460" cy="285" r="1.5" fill-opacity="0.5"/>
    <circle cx="320" cy="230" r="2.5" fill-opacity="1"/>
  </g>
  <!-- Bounding boxes -->
  <g stroke="#ff6ad5" stroke-opacity="0.8" fill="none" stroke-width="1.2">
    <rect x="200" y="230" width="80" height="70"/>
    <rect x="360" y="230" width="90" height="75"/>
  </g>
  <g fill="#ff6ad5" font-family="JetBrains Mono, monospace" font-size="9" fill-opacity="0.9">
    <text x="200" y="222">chair</text>
    <text x="360" y="222">table</text>
  </g>
  <g font-family="JetBrains Mono, monospace" fill="#ffffff" fill-opacity="0.85">
    <text x="20" y="40" font-size="14" font-weight="700" letter-spacing="3">WORLD MODEL · 3D</text>
    <text x="20" y="60" font-size="10" fill-opacity="0.6">RECONSTRUCTION PREVIEW</text>
    <text x="20" y="460" font-size="10" fill-opacity="0.5">PLACEHOLDER</text>
  </g>
</svg>
